<h1>Orders</h1>

<abp-card>
  <abp-card-body>
    <div class="list-group">
      @for (order of orders; track order.id) {
      <div class="list-group-item">
        <strong>Customer:</strong> {{ order.customerName }} <br />
        <strong>Product:</strong> {{ order.productName }} <br />
        <strong>State:</strong> {{ order.state }}
      </div>
      }
    </div>
  </abp-card-body>
</abp-card>
