<h1>Products</h1>

<abp-card>
  <abp-card-body>
    <ul class="list-group">
      @for (product of products; track product.id) {
        <li class="list-group-item d-flex justify-content-between align-items-center">
          {{ product.name }}
          <span class="badge bg-secondary">stock: {{ product.stockCount }}</span>
        </li>
      }
    </ul>
  </abp-card-body>
</abp-card>
